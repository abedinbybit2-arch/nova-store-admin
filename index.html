<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login -->
  <div id="loginView" class="login-screen">
    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="login-brand">NOVA</div>
      <h1>Admin</h1>
      <p class="login-sub">Sign in to manage storefront content and messages</p>
      <label class="field">
        <span>Password</span>
        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" />
      </label>
      <button type="submit" class="btn" id="loginBtn">Sign in</button>
      <p class="error" id="loginError" hidden></p>
    </form>
  </div>

  <!-- Dashboard -->
  <div id="adminView" class="shell" hidden>
    <aside class="sidebar">
      <div class="side-brand">NOVA</div>
      <nav class="side-nav">
        <button type="button" class="nav-item active" data-tab="content">Content</button>
        <button type="button" class="nav-item" data-tab="products">Products</button>
        <button type="button" class="nav-item" data-tab="messages">
          Messages
          <span class="badge" id="msgBadge" hidden>0</span>
        </button>
      </nav>
      <button type="button" class="logout" id="logoutBtn">Sign out</button>
    </aside>

    <div class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Content</h1>
          <p id="pageSub">Update what customers see on the storefront</p>
        </div>
      </header>

      <!-- Content -->
      <section class="panel tab" id="tab-content">
        <form id="settingsForm" class="card form">
          <div class="form-row">
            <label class="field">
              <span>Site title</span>
              <input type="text" id="titleInput" required maxlength="80" />
            </label>
            <label class="field">
              <span>Tagline</span>
              <input type="text" id="taglineInput" maxlength="160" />
            </label>
          </div>
          <label class="field">
            <span>Hero text</span>
            <textarea id="heroInput" rows="3" maxlength="400"></textarea>
          </label>
          <div class="actions">
            <button type="submit" class="btn">Save changes</button>
            <span class="ok" id="settingsMsg" hidden>Saved</span>
          </div>
        </form>
      </section>

      <!-- Products -->
      <section class="panel tab" id="tab-products" hidden>
        <form id="productForm" class="card form">
          <h2>Add product</h2>
          <div class="form-row">
            <label class="field">
              <span>Name</span>
              <input type="text" id="productName" required maxlength="80" />
            </label>
            <label class="field">
              <span>Price (USD)</span>
              <input type="number" id="productPrice" min="0" step="0.01" required />
            </label>
          </div>
          <label class="field">
            <span>Description</span>
            <input type="text" id="productDesc" maxlength="200" />
          </label>
          <label class="field">
            <span>Image URL</span>
            <input type="url" id="productImage" placeholder="https://" />
          </label>
          <div class="actions">
            <button type="submit" class="btn">Add product</button>
            <span class="ok" id="productMsg" hidden>Product added</span>
          </div>
        </form>

        <div class="card list-card">
          <h2>Catalog</h2>
          <div id="adminProductList" class="product-list"></div>
        </div>
      </section>

      <!-- Messages -->
      <section class="panel tab" id="tab-messages" hidden>
        <div class="chat-layout">
          <div class="card convo-list">
            <h2>Inbox</h2>
            <div id="conversationList" class="conversations"></div>
          </div>
          <div class="card convo-thread">
            <div id="threadEmpty" class="thread-empty">Select a conversation</div>
            <div id="threadActive" hidden>
              <div class="thread-head">
                <div>
                  <strong id="threadName">—</strong>
                  <p id="threadEmail"></p>
                </div>
                <button type="button" class="btn-ghost" id="closeConvoBtn">Mark closed</button>
              </div>
              <div class="thread-messages" id="threadMessages"></div>
              <form id="adminReplyForm" class="thread-reply">
                <input type="text" id="adminReplyInput" placeholder="Write a reply…" required maxlength="1000" autocomplete="off" />
                <button type="submit" class="btn">Send</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
